<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--surface:#141417;--surface2:#1c1c21;--border:#2a2a32;--border2:#38383f;--text:#f0eff4;--muted:#7a7a8a;--subtle:#3a3a46;--soccer:#00e5a0;--soccer-bg:rgba(0,229,160,.08);--basketball:#ff9500;--basketball-bg:rgba(255,149,0,.08);--nfl:#ff4545;--nfl-bg:rgba(255,69,69,.08);--tennis:#c9a000;--tennis-bg:rgba(201,160,0,.08);--accent:#7b6cff;--accent-bg:rgba(123,108,255,.12);--r:8px;--rl:14px}
[data-theme=light]{--bg:#f5f5f7;--surface:#fff;--surface2:#eeeef0;--border:#d8d8de;--border2:#c4c4cc;--text:#111113;--muted:#6b6b7a;--subtle:#b0b0be;--soccer:#008a60;--soccer-bg:rgba(0,138,96,.07);--basketball:#b85e00;--basketball-bg:rgba(184,94,0,.07);--nfl:#c0292a;--nfl-bg:rgba(192,41,42,.07);--tennis:#8a6b00;--tennis-bg:rgba(138,107,0,.07);--accent:#5a4de8;--accent-bg:rgba(90,77,232,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;min-height:100vh;transition:background .2s,color .2s}
header{border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;background:var(--bg);z-index:100;transition:background .2s,border-color .2s}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;letter-spacing:-.02em}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.status{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);padding:4px 10px;border:1px solid var(--border);border-radius:20px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--soccer);box-shadow:0 0 8px var(--soccer)}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#6a5be8;border-color:#6a5be8;color:#fff}
.btn-danger{border-color:#5a2020;color:var(--nfl)}
.btn-danger:hover{background:rgba(255,69,69,.1)}
.btn-sm{padding:4px 10px;font-size:12px}
.theme-btn{width:34px;height:34px;padding:0;justify-content:center;font-size:16px}
.ewrap{position:relative}
.emenu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:6px;min-width:190px;z-index:300;flex-direction:column;gap:2px;transition:background .2s}
.emenu.open{display:flex}
.eitem{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s}
.eitem:hover{background:var(--surface2);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;cursor:pointer;transition:all .15s}
.stat-card:hover{border-color:var(--border2)}
.stat-card.on{border-color:var(--accent);background:var(--accent-bg)}
.stat-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;letter-spacing:-.03em}
.toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.trow{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:8px 12px;outline:none;transition:all .15s}
.search-wrap input:focus{border-color:var(--accent)}
.flabel{font-size:11px;font-family:'DM Mono',monospace;color:var(--subtle);letter-spacing:.06em;text-transform:uppercase;margin-right:2px}
.csel{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;padding:7px 10px;cursor:pointer;outline:none;transition:all .15s}
.csel:focus{border-color:var(--accent)}
.csel option{background:var(--surface2)}
.month-group{margin-bottom:2.5rem}
.month-heading{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.month-name{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}
.month-line{flex:1;height:1px;background:var(--border)}
.month-count{font-size:11px;font-family:'DM Mono',monospace;color:var(--subtle)}
.erow{display:grid;grid-template-columns:110px 90px 110px 1fr auto;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:6px;transition:all .15s}
.erow:hover{border-color:var(--border2);background:var(--surface2)}
.edate{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);line-height:1.5}
.etime{font-family:'DM Mono',monospace;font-size:11px;color:var(--subtle)}
.sbadge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;font-family:'DM Mono',monospace;white-space:nowrap}
.bs{background:var(--soccer-bg);color:var(--soccer);border:1px solid rgba(0,229,160,.2)}
.bb{background:var(--basketball-bg);color:var(--basketball);border:1px solid rgba(255,149,0,.2)}
.bn{background:var(--nfl-bg);color:var(--nfl);border:1px solid rgba(255,69,69,.2)}
.bt{background:var(--tennis-bg);color:var(--tennis);border:1px solid rgba(201,160,0,.2)}
.cbadge{display:inline-block;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;transition:all .2s}
.einfo{min-width:0}
.ename{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.edetails{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eactions{display:flex;gap:6px;flex-shrink:0}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:13px;background:var(--surface);border:1px dashed var(--border);border-radius:var(--rl)}
.empty .big{font-size:32px;margin-bottom:8px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;transition:background .2s}
.modal h2{font-size:18px;font-weight:800;margin-bottom:1.5rem;letter-spacing:-.02em}
.form-row{margin-bottom:14px}
label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
input[type=text],input[type=date],select,textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:all .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:70px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfooter{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.dropzone{border:2px dashed var(--border2);border-radius:var(--rl);padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:16px}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-bg)}
.dropzone input{display:none}
.dzi{font-size:28px;margin-bottom:10px}
.dzt{font-size:13px;color:var(--muted)}
.dzt strong{color:var(--text)}
.iprev{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);max-height:160px;overflow-y:auto;white-space:pre;margin-bottom:14px;display:none}
.inote{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.7}
code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 18px;font-size:13px;font-weight:600;color:var(--text);z-index:999;opacity:0;transform:translateY(12px);transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:var(--soccer);color:var(--soccer)}
.toast.error{border-color:var(--nfl);color:var(--nfl)}
.toast.info{border-color:var(--accent);color:var(--accent)}
@media(max-width:780px){.container{padding:1rem}header{padding:0 1rem}.erow{grid-template-columns:90px 80px 1fr}.erow .cbadge,.erow .eactions{grid-column:1/-1}.eactions{justify-content:flex-end}.fr2{grid-template-columns:1fr}.header-actions .btn span{display:none}}
</style>
</head>
<body>
<script>(function(){try{if(localStorage.getItem('sc_theme')==='light')document.documentElement.setAttribute('data-theme','light')}catch(e){}})()</script>

<header>
  <div class="logo"><div class="logo-dot"></div>Sports Calendar</div>
  <div class="status"><div class="sdot"></div><span>pronto</span></div>
  <div class="header-actions">
    <button class="btn theme-btn" id="theme-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
    <div class="ewrap" id="ewrap">
      <button class="btn" onclick="toggleExport()">⬇ <span>Exportar</span></button>
      <div class="emenu" id="emenu">
        <div class="eitem" onclick="exportCSV()">📄 CSV (.csv)</div>
        <div class="eitem" onclick="exportJSON()">📦 JSON (.json)</div>
      </div>
    </div>
    <button class="btn" onclick="openImport()">⬆ <span>Importar</span></button>
    <button class="btn btn-primary" onclick="openAdd()">+ <span>Novo evento</span></button>
  </div>
</header>

<div class="container">
  <div class="stats-row" id="stats-row"></div>
  <div class="toolbar">
    <div class="trow">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Buscar evento, time, local..." oninput="renderCalendar()">
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="flabel">Esporte</span>
        <select class="csel" id="sport-select" onchange="setSport(this.value)">
          <option value="all">Todos os esportes</option>
          <option value="soccer">⚽ Futebol</option>
          <option value="basketball">🏀 Basketball</option>
          <option value="nfl">🏈 NFL</option>
          <option value="tennis">🎾 Tênis</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;align-items:center" id="comp-row" style="display:none">
        <span class="flabel">Competição</span>
        <select class="csel" id="comp-select" onchange="setComp(this.value)"></select>
      </div>
    </div>
  </div>
  <div id="calendar"></div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal-event">
  <div class="modal">
    <h2 id="modal-title">Novo evento</h2>
    <input type="hidden" id="edit-id">
    <div class="fr2">
      <div class="form-row"><label>Data</label><input type="date" id="f-date"></div>
      <div class="form-row"><label>Horário</label><input type="text" id="f-time" placeholder="19h00 (Brasília)"></div>
    </div>
    <div class="fr2">
      <div class="form-row">
        <label>Modalidade</label>
        <select id="f-sport" onchange="updateSuggestions()">
          <option value="soccer">⚽ Futebol</option>
          <option value="basketball">🏀 Basketball</option>
          <option value="nfl">🏈 NFL</option>
          <option value="tennis">🎾 Tênis</option>
        </select>
      </div>
      <div class="form-row">
        <label>Competição</label>
        <input type="text" id="f-competition" list="comp-dl" placeholder="Ex: Copa do Mundo">
        <datalist id="comp-dl"></datalist>
      </div>
    </div>
    <div class="form-row"><label>Nome do evento</label><input type="text" id="f-name" placeholder="Ex: Brasil x Marrocos"></div>
    <div class="form-row"><label>Times / atletas</label><input type="text" id="f-teams" placeholder="Ex: Brasil x Marrocos"></div>
    <div class="form-row"><label>Local / detalhes</label><textarea id="f-details" placeholder="Ex: MetLife Stadium, Nova Jersey"></textarea></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal('modal-event')">Cancelar</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveEvent()">Salvar evento</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="overlay" id="modal-import">
  <div class="modal">
    <h2>Importar eventos</h2>
    <div class="dropzone" onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="this.classList.remove('drag');handleDrop(event)">
      <input type="file" id="file-input" accept=".json,.csv" onchange="handleFile(this.files[0])">
      <div class="dzi">📂</div>
      <div class="dzt"><strong>Clique ou arraste um arquivo</strong><br>Aceita JSON ou CSV</div>
    </div>
    <div class="iprev" id="import-preview"></div>
    <div class="inote"><strong>Campos:</strong> <code>date</code>, <code>time</code>, <code>sport</code> (soccer/basketball/nfl/tennis), <code>competition</code>, <code>name</code>, <code>teams</code>, <code>details</code></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal('modal-import')">Cancelar</button>
      <button class="btn btn-primary" id="import-btn" onclick="confirmImport()" style="display:none">Importar eventos</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const KEY = 'sports_cal_v5'; // bump version to force reload of new events
const PRESETS = {
  soccer:['Copa do Mundo','Copa Libertadores','Copa do Brasil','Campeonato Brasileiro','Champions League','Premier League','La Liga','Bundesliga','Serie A','Ligue 1'],
  basketball:['NBA Finals','NBA Playoffs','NBA Regular Season'],
  nfl:['NFL Regular Season','NFL Playoffs','Super Bowl'],
  tennis:['Australian Open','Roland Garros','Wimbledon','US Open','ATP Finals','WTA Finals'],
};
const SLABELS = {soccer:'Futebol',basketball:'Basketball',nfl:'NFL',tennis:'Tênis'};
const SC = {soccer:'bs',basketball:'bb',nfl:'bn',tennis:'bt'};
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let events = [], sport = 'all', comp = 'all', pendingImport = null;

function save(){try{localStorage.setItem(KEY,JSON.stringify(events));}catch(e){}}
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return null;}}

function init(){
  const saved = load();
  events = (saved && saved.length) ? saved : defaultEvents();
  if(!saved || !saved.length) save();
  renderAll();
}

// ── RENDER ────────────────────────────────────────────────────
function getFiltered(){
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  return events
    .filter(e => sport==='all' || e.sport===sport)
    .filter(e => comp==='all' || e.competition===comp)
    .filter(e => !q || [e.name,e.teams,e.details,e.competition,e.date].some(f=>(f||'').toLowerCase().includes(q)))
    .sort((a,b) => a.date.localeCompare(b.date));
}

function renderStats(){
  const cnt = {soccer:0,basketball:0,nfl:0,tennis:0};
  events.forEach(e=>{if(cnt[e.sport]!==undefined)cnt[e.sport]++;});
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card ${sport==='all'?'on':''}" onclick="setSport('all')"><div class="stat-label">Total</div><div class="stat-value" style="color:var(--text)">${events.length}</div></div>
    <div class="stat-card ${sport==='soccer'?'on':''}" onclick="setSport('soccer')"><div class="stat-label">Futebol</div><div class="stat-value" style="color:var(--soccer)">${cnt.soccer}</div></div>
    <div class="stat-card ${sport==='basketball'?'on':''}" onclick="setSport('basketball')"><div class="stat-label">Basketball</div><div class="stat-value" style="color:var(--basketball)">${cnt.basketball}</div></div>
    <div class="stat-card ${sport==='nfl'?'on':''}" onclick="setSport('nfl')"><div class="stat-label">NFL</div><div class="stat-value" style="color:var(--nfl)">${cnt.nfl}</div></div>
    <div class="stat-card ${sport==='tennis'?'on':''}" onclick="setSport('tennis')"><div class="stat-label">Tênis</div><div class="stat-value" style="color:var(--tennis)">${cnt.tennis}</div></div>`;
  const ss = document.getElementById('sport-select');
  if(ss) ss.value = sport;
}

function renderCompRow(){
  const row = document.getElementById('comp-row');
  const sel = document.getElementById('comp-select');
  if(sport==='all'){row.style.display='none';return;}
  const fromEv = [...new Set(events.filter(e=>e.sport===sport&&e.competition).map(e=>e.competition))];
  const all = [...new Set([...fromEv,...(PRESETS[sport]||[])])];
  if(!all.length){row.style.display='none';return;}
  if(comp!=='all'&&!all.includes(comp))comp='all';
  sel.innerHTML = `<option value="all">Todas as competições</option>`+all.map(c=>`<option value="${esc(c)}"${comp===c?' selected':''}>${esc(c)}</option>`).join('');
  sel.value = comp;
  row.style.display = 'flex';
}

function renderCalendar(){
  const filtered = getFiltered();
  const cal = document.getElementById('calendar');
  if(!filtered.length){cal.innerHTML=`<div class="empty"><div class="big">🔍</div>Nenhum evento encontrado.</div>`;return;}
  const groups = {};
  filtered.forEach(e=>{
    const d = new Date(e.date+'T12:00:00');
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!groups[key])groups[key]={label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,items:[]};
    groups[key].items.push(e);
  });
  let html = '';
  Object.keys(groups).sort().forEach(key=>{
    const g = groups[key];
    html += `<div class="month-group"><div class="month-heading"><span class="month-name">${g.label}</span><div class="month-line"></div><span class="month-count">${g.items.length} evento${g.items.length!==1?'s':''}</span></div>`;
    g.items.forEach(e=>{
      const d = new Date(e.date+'T12:00:00');
      const day = d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
      html += `<div class="erow">
        <div class="edate">${day}<div class="etime">${e.time||'—'}</div></div>
        <div><span class="sbadge ${SC[e.sport]||'bs'}">${SLABELS[e.sport]||e.sport}</span></div>
        <div><span class="cbadge">${esc(e.competition||'—')}</span></div>
        <div class="einfo"><div class="ename">${esc(e.name)}</div><div class="edetails">${[e.teams,e.details].filter(Boolean).map(esc).join(' · ')}</div></div>
        <div class="eactions">
          <button class="btn btn-sm" onclick="openEdit('${e.id}')">✏ Editar</button>
          <button class="btn btn-sm btn-danger" onclick="delEvent('${e.id}')">✕</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  cal.innerHTML = html;
}

function renderAll(){renderStats();renderCompRow();renderCalendar();}

// ── FILTERS ───────────────────────────────────────────────────
function setSport(s){sport=s;comp='all';document.getElementById('sport-select').value=s;renderAll();}
function setComp(c){comp=c;renderCalendar();}

// ── ADD / EDIT ────────────────────────────────────────────────
function updateSuggestions(){
  const s = document.getElementById('f-sport').value;
  const fromEv = [...new Set(events.filter(e=>e.sport===s&&e.competition).map(e=>e.competition))];
  document.getElementById('comp-dl').innerHTML = [...new Set([...fromEv,...(PRESETS[s]||[])])].map(c=>`<option value="${esc(c)}">`).join('');
}

function openAdd(){
  document.getElementById('modal-title').textContent='Novo evento';
  document.getElementById('edit-id').value='';
  ['f-time','f-name','f-teams','f-details','f-competition'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-sport').value='soccer';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  updateSuggestions();
  openModal('modal-event');
}

function openEdit(id){
  const e = events.find(x=>x.id===id); if(!e)return;
  document.getElementById('modal-title').textContent='Editar evento';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-date').value=e.date;
  document.getElementById('f-time').value=e.time||'';
  document.getElementById('f-sport').value=e.sport;
  document.getElementById('f-competition').value=e.competition||'';
  document.getElementById('f-name').value=e.name;
  document.getElementById('f-teams').value=e.teams||'';
  document.getElementById('f-details').value=e.details||'';
  updateSuggestions();
  openModal('modal-event');
}

function saveEvent(){
  const date=document.getElementById('f-date').value;
  const name=document.getElementById('f-name').value.trim();
  if(!date||!name){toast('Preencha data e nome','error');return;}
  const obj={id:document.getElementById('edit-id').value||uid(),date,time:document.getElementById('f-time').value.trim(),sport:document.getElementById('f-sport').value,competition:document.getElementById('f-competition').value.trim(),name,teams:document.getElementById('f-teams').value.trim(),details:document.getElementById('f-details').value.trim()};
  const idx=events.findIndex(x=>x.id===obj.id);
  if(idx>=0)events[idx]=obj;else events.push(obj);
  save();renderAll();closeModal('modal-event');
  toast(idx>=0?'✓ Evento atualizado!':'✓ Evento adicionado!','success');
}

function delEvent(id){
  if(!confirm('Remover este evento?'))return;
  events=events.filter(e=>e.id!==id);
  save();renderAll();toast('Evento removido','error');
}

// ── EXPORT ────────────────────────────────────────────────────
function toggleExport(){document.getElementById('emenu').classList.toggle('open');}
document.addEventListener('click',e=>{const w=document.getElementById('ewrap');if(w&&!w.contains(e.target))document.getElementById('emenu').classList.remove('open');});

function exportCSV(){
  document.getElementById('emenu').classList.remove('open');
  const headers=['Data','Horário','Esporte','Competição','Evento','Times','Local/Detalhes'];
  const rows=events.map(e=>[e.date,e.time||'',SLABELS[e.sport]||e.sport,e.competition||'',e.name,e.teams||'',e.details||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';'));
  const blob=new Blob(['\uFEFF'+[headers.join(';'),...rows].join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sports-calendar-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast('✓ CSV exportado!','success');
}

function exportJSON(){
  document.getElementById('emenu').classList.remove('open');
  const blob=new Blob([JSON.stringify(events,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sports-calendar-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('✓ JSON exportado!','success');
}

// ── IMPORT ────────────────────────────────────────────────────
function openImport(){
  pendingImport=null;
  document.getElementById('import-preview').style.display='none';
  document.getElementById('import-preview').textContent='';
  document.getElementById('import-btn').style.display='none';
  document.getElementById('file-input').value='';
  openModal('modal-import');
}
function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleFile(f);}
function handleFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      let parsed=[];
      if(file.name.endsWith('.json')){parsed=JSON.parse(ev.target.result);if(!Array.isArray(parsed))throw new Error('JSON deve ser um array');}
      else parsed=parseCSV(ev.target.result);
      parsed=parsed.map(e=>({id:uid(),date:e.date||'',time:e.time||'',sport:(e.sport||'soccer').toLowerCase(),competition:e.competition||'',name:e.name||'',teams:e.teams||'',details:e.details||''})).filter(e=>e.date&&e.name);
      if(!parsed.length)throw new Error('Nenhum evento válido encontrado');
      pendingImport=parsed;
      const prev=document.getElementById('import-preview');
      prev.style.display='block';
      prev.textContent=`${parsed.length} evento(s):\n\n`+parsed.slice(0,5).map(e=>`${e.date} | ${e.sport} | ${e.name}`).join('\n')+(parsed.length>5?`\n... +${parsed.length-5}`:'');
      document.getElementById('import-btn').style.display='inline-flex';
    }catch(err){toast('Erro: '+err.message,'error');}
  };
  reader.readAsText(file);
}
function parseCSV(text){
  const sep=text.includes(';')?';':',';
  const lines=text.trim().split('\n');
  const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line=>{const vals=line.split(sep).map(v=>v.trim().replace(/^"|"$/g,''));const o={};headers.forEach((h,i)=>{o[h]=vals[i]||''});return o;});
}
function confirmImport(){
  if(!pendingImport)return;
  const replace=confirm('OK → SUBSTITUIR todos os eventos\nCancelar → ADICIONAR aos existentes');
  events=replace?pendingImport:[...events,...pendingImport];
  save();renderAll();closeModal('modal-import');
  toast(`✓ ${pendingImport.length} evento(s) importado(s)!`,'success');pendingImport=null;
}

// ── MODALS ────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type='success'){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;
  clearTimeout(t._t);t._t=setTimeout(()=>{t.className='toast';},3000);
}

// ── THEME ─────────────────────────────────────────────────────
function toggleTheme(){
  const light=document.documentElement.getAttribute('data-theme')==='light';
  if(light)document.documentElement.removeAttribute('data-theme');else document.documentElement.setAttribute('data-theme','light');
  document.getElementById('theme-btn').textContent=light?'🌙':'☀️';
  try{localStorage.setItem('sc_theme',light?'dark':'light');}catch(e){}
}
document.addEventListener('DOMContentLoaded',()=>{
  if(document.documentElement.getAttribute('data-theme')==='light')
    document.getElementById('theme-btn').textContent='🌙';
});
